<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AH Wonders Game</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9333ea">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-gradient-to-br from-purple-600 to-pink-600 min-h-screen font-[Poppins]">

<div id="root"></div>

<script type="text/babel">

const firebaseConfig={
apiKey:"AIzaSyA7NSVpe6r3xShg8A4xXTUus-8jevFp2GE",
authDomain:"ah-numbergame.firebaseapp.com",
databaseURL:"https://ah-numbergame-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"ah-numbergame",
storageBucket:"ah-numbergame.firebasestorage.app",
messagingSenderId:"857673741338",
appId:"1:857673741338:web:3312e8c2c6780bce9d4da3"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const {useState,useEffect,useRef}=React;

function App(){

const Header=()=>(
<div className="text-center text-4xl font-extrabold bg-gradient-to-r from-yellow-300 via-pink-300 to-cyan-300 text-transparent bg-clip-text mb-6">
AH Wonders Game
</div>
);

const [screen,setScreen]=useState("menu");
const [room,setRoom]=useState("");
const [name,setName]=useState("");
const [player,setPlayer]=useState(null);
const [secret,setSecret]=useState("");
const [guess,setGuess]=useState("");
const [error,setError]=useState("");
const [gameData,setGameData]=useState(null);
const [timerSetting,setTimerSetting]=useState(50);
const [timeLeft,setTimeLeft]=useState(0);
const [score,setScore]=useState(0);
const [soundPlayed,setSoundPlayed]=useState(false);

useEffect(()=>{

setRoom("");
setPlayer(null);
setGameData(null);
setScreen("menu");

},[]);


const winSound=useRef(new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"));
const loseSound=useRef(new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"));

const generateRoom=()=>Math.floor(1000+Math.random()*9000).toString();
const hasDuplicate=n=>new Set(n.split("")).size!==n.length;
const isValidNumber=n=>/^\d{4}$/.test(n);

/* CREATE ROOM */

const createRoom=()=>{

if(!name) return;

const newRoom=generateRoom();

db.ref("rooms/"+newRoom).set({
player1:name,
player2:null,
secret1:null,
secret2:null,
guesses:[],
winner:null,
turn:null,
score1:0,
score2:0,
timer:timerSetting,
turnEnd:null
});

db.ref("rooms/"+newRoom).onDisconnect().remove();

setRoom(newRoom);
setPlayer(1);
setScreen("setup");

};

/* JOIN ROOM */

const joinRoom=()=>{

if(!name || room.length!==4) return;

const ref=db.ref("rooms/"+room);

ref.once("value",snap=>{

if(!snap.exists()){
alert("Room not found");
return;
}

const data=snap.val();

if(data.player2){
alert("Room full");
setRoom("");
return;
}

if(data.secret1 && data.secret2){
alert("Game already started");
setRoom("");
return;
}

ref.update({player2:name});

setPlayer(2);
setScreen("setup");

});

};

/* LISTENER */

useEffect(()=>{

if(!room || !player) return;

const ref=db.ref("rooms/"+room);

ref.on("value",snap=>{

const data=snap.val();
setGameData(data);

if(!data) return;

const currentScore=player===1?data.score1||0:data.score2||0;
setScore(currentScore);

if(data.winner && !soundPlayed){

if(data.winner===player){

winSound.current.play();

confetti({
particleCount:150,
spread:90,
origin:{y:0.6}
});

}else{
loseSound.current.play();
}

setSoundPlayed(true);
}

});

return ()=>ref.off();

},[room,player,soundPlayed]);

/* TIMER */

useEffect(()=>{

if(!gameData||gameData.winner) return;

const interval=setInterval(()=>{

const remaining=Math.floor((gameData.turnEnd-Date.now())/1000);

setTimeLeft(remaining>0?remaining:0);

if(remaining<=0 && gameData.turn===player){

const nextTurn=player===1?2:1;

db.ref("rooms/"+room).update({
turn:nextTurn,
turnEnd:Date.now()+gameData.timer*1000
});

}

},500);

return()=>clearInterval(interval);

},[gameData]);

/* START GAME */

useEffect(()=>{

if(gameData?.secret1 && gameData?.secret2){

setScreen("play");

if(!gameData.turn){

db.ref("rooms/"+room).update({
turn:1,
turnEnd:Date.now()+gameData.timer*1000
});

}

}

},[gameData]);

/* SECRET */

const submitSecret=()=>{

setError("");

if(!isValidNumber(secret)) return setError("Enter 4 digits");
if(hasDuplicate(secret)) return setError("Duplicate number not allowed");

db.ref("rooms/"+room).update({
["secret"+player]:secret
});

setScreen("waiting");

};

/* CHECK GUESS */

const checkGuess=(g,s)=>{

let correctPos=0;
let correctNum=0;

for(let i=0;i<4;i++)
if(g[i]===s[i]) correctPos++;

for(let d of g)
if(s.includes(d)) correctNum++;

return{correctNum,correctPos};

};

/* MAKE GUESS */

const makeGuess=()=>{

setError("");

if(gameData.winner) return;
if(gameData.turn!==player) return;

if(!isValidNumber(guess)) return setError("Enter 4 digits");
if(hasDuplicate(guess)) return setError("Duplicate number not allowed");

const opponentSecret=player===1?gameData.secret2:gameData.secret1;
const result=checkGuess(guess,opponentSecret);

const guessScore=(result.correctPos*25)+((result.correctNum-result.correctPos)*10);

const updated=[...(gameData.guesses||[]),{
player,
guess,
correctNum:result.correctNum,
correctPos:result.correctPos
}];

db.ref("rooms/"+room).update({
guesses:updated,
winner:result.correctPos===4?player:null,
turn:result.correctPos===4?null:(player===1?2:1),
turnEnd:Date.now()+gameData.timer*1000,
["score"+player]:guessScore
});

if(result.correctPos===4){

setTimeout(()=>{

db.ref("rooms/"+room).remove();

/* RETURN TO HOME SCREEN */

setRoom("");
setPlayer(null);
setGameData(null);
setScreen("menu");

},60000);

}
setGuess("");

};

const resetGame=()=>{
setRoom("");
setPlayer(null);
setSecret("");
setGuess("");
setGameData(null);
setScore(0);
setSoundPlayed(false);
setScreen("menu");
};

const timerPercent=gameData?.timer?(timeLeft/gameData.timer)*100:0;

/* MENU */

if(screen==="menu")

return(
<div className="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl">

<Header/>


<input className="border p-2 w-full mb-3"
placeholder="Your name"
value={name}
onChange={e=>setName(e.target.value)}
/>

<select
className="border p-2 w-full mb-3 rounded"
value={timerSetting}
onChange={e=>setTimerSetting(parseInt(e.target.value))}
>
<option value="60">Easy (60 seconds)</option>
<option value="50">Normal (50 seconds)</option>
<option value="40">Hard (40 seconds)</option>
</select>

<button
onClick={createRoom}
className="bg-purple-600 text-white w-full p-2 mb-3 rounded">
Create Room
</button>

<input
className="border p-2 w-full mb-3 text-center"
placeholder="Room Code"
maxLength="4"
value={room}
onChange={e=>setRoom(e.target.value)}
/>

<button
onClick={joinRoom}
className="bg-pink-600 text-white w-full p-2 rounded">
Join Room
</button>

</div>
);

/* SETUP */

if(screen==="setup")

return(
<div className="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl">

<Header/>

<h2 className="text-center font-bold mb-4">
Room Code: <span className="text-purple-600 text-2xl">{room}</span>
</h2>

<input
className="border p-2 w-full mb-2 text-center text-xl"
maxLength="4"
value={secret}
onChange={e=>setSecret(e.target.value.replace(/\D/g,''))}
placeholder="Secret Number"
/>

{error && <p className="text-red-500 mb-2">{error}</p>}

<button
onClick={submitSecret}
className="bg-purple-600 text-white w-full p-2 rounded">
Submit Secret
</button>

</div>
);

/* WAITING */

if(screen==="waiting")

return(
<div className="text-white text-center mt-40 text-2xl">
<Header/>
Waiting for opponent...
</div>
);

/* PLAY */

if(screen==="play")

return(

<div className="max-w-5xl mx-auto mt-10 bg-white p-6 rounded-xl">

<Header/>
{gameData?.winner && (

<div className={`text-center text-2xl font-bold p-3 mb-6 rounded-lg ${
gameData.winner===player
? "bg-green-500 text-white"
: "bg-red-500 text-white"
}`}>

{gameData.winner===player ? "🎉 YOU WON!" : "❌ YOU LOST!"}

</div>

)}

<div className="flex justify-between items-center mb-4 px-4 py-2 bg-gray-100 rounded-lg">

<div className="font-bold text-purple-700 text-lg">
Hi! {player===1?gameData.player1:gameData.player2}
</div>

<div className="bg-purple-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow">
VS
</div>

<div className="font-bold text-pink-700 text-lg">
{player===1?gameData.player2:gameData.player1}
</div>

</div>

<div className="mb-4">

<div className="text-center text-lg font-semibold text-white bg-purple-500 py-2 rounded-lg">
{gameData.turn===1
?`${gameData.player1} Turn (${timeLeft}s)`
:`${gameData.player2} Turn (${timeLeft}s)`
}
</div>

<div className="w-full bg-gray-200 h-3 rounded-b-lg overflow-hidden">
<div
className={`h-3 transition-all duration-500 ${
timeLeft>10?"bg-green-500":timeLeft>5?"bg-yellow-500":"bg-red-500"
}`}
style={{width:timerPercent+"%"}}
/>
</div>

</div>

<div className="flex justify-between items-center mb-6">

<div>
<div className="text-sm text-gray-500">Your Secret</div>
<div className="text-2xl font-bold text-purple-700">
{player===1?gameData.secret1:gameData.secret2}
</div>
</div>

<div className="w-48 text-right">
<div className="text-sm text-gray-500">Your Score</div>
<div className="font-bold text-green-600">{score}/100</div>

<div className="w-full bg-gray-200 h-3 rounded-full mt-1">
<div className="bg-green-500 h-3 rounded-full transition-all duration-500"
style={{width:score+"%"}}
/>
</div>

</div>

</div>

<input
className="border p-2 w-full mb-2 text-center text-xl"
maxLength="4"
value={guess}
onChange={e=>setGuess(e.target.value.replace(/\D/g,''))}
placeholder="Enter Guess"
/>

{error && <p className="text-red-500 mb-2">{error}</p>}

<button
disabled={gameData.turn!==player || gameData.winner}
onClick={makeGuess}
className={`w-full p-2 rounded mb-6 text-white ${
gameData.turn===player?"bg-purple-600":"bg-gray-400 cursor-not-allowed"
}`}>
Submit Guess
</button>

<div className="grid grid-cols-2 gap-6 mt-6">

{[1,2].map(p => (

<div key={p}>

<h3 className="font-bold mb-2">
{gameData["player"+p]} Guesses
</h3>

{(gameData.guesses || [])
.filter(g => g.player === p)
.map((g,i)=> (

<div key={i} className="border p-2 mb-2 flex justify-between items-center">

<span className="font-semibold text-lg">
{g.guess}
</span>

<div className="flex gap-4">

<div className="text-center">
<div className="text-xl font-bold text-purple-600">
{g.correctNum}
</div>
<div className="text-xs text-gray-500">
numbers
</div>
</div>

<div className="text-center">
<div className="text-xl font-bold text-pink-600">
{g.correctPos}
</div>
<div className="text-xs text-gray-500">
places
</div>
</div>

</div>

</div>

))}

</div>

))}

</div>

{/* WINNER PANEL */}

{gameData?.winner && (

<div className="text-center mt-8 p-6 bg-yellow-100 rounded-xl">

<div className="text-2xl font-bold mb-3">
{gameData.winner===player ? "You Won 🎉" : "You Lost ❌"}
</div>

<div className="mb-4">
<div className="text-sm text-gray-600">
{player===1 ? gameData.player2 : gameData.player1}'s Secret Number
</div>

<div className="text-3xl font-bold text-purple-700">
{player===1 ? gameData.secret2 : gameData.secret1}
</div>
</div>

<button
onClick={resetGame}
className="bg-green-600 text-white px-6 py-2 rounded-lg">
Play Again
</button>

</div>

)}

</div>

);

return null;

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
