<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AH NUMBER GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-gradient-to-br from-purple-600 to-pink-600 min-h-screen font-[Poppins]">

<div id="root"></div>

<script type="text/babel">

const firebaseConfig={
apiKey:"AIzaSyA7NSVpe6r3xShg8A4xXTUus-8jevFp2GE",
authDomain:"ah-numbergame.firebaseapp.com",
databaseURL:"https://ah-numbergame-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"ah-numbergame",
storageBucket:"ah-numbergame.firebasestorage.app",
messagingSenderId:"857673741338",
appId:"1:857673741338:web:3312e8c2c6780bce9d4da3"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const {useState,useEffect}=React;

function App(){

const [screen,setScreen]=useState("menu");
const [name,setName]=useState("");
const [room,setRoom]=useState("");
const [player,setPlayer]=useState(null);
const [secret,setSecret]=useState("");
const [guess,setGuess]=useState("");
const [gameData,setGameData]=useState(null);
const [timer,setTimer]=useState(20);
const [timeLeft,setTimeLeft]=useState(0);

const generateRoom=()=>Math.floor(1000+Math.random()*9000).toString();

/* CREATE ROOM */

const createRoom=()=>{

if(!name) return;

const newRoom=generateRoom();

db.ref("rooms/"+newRoom).set({
player1:name,
player2:null,
secret1:null,
secret2:null,
turn:1,
timer:timer,
turnEnd:Date.now()+timer*1000
});

setRoom(newRoom);
setPlayer(1);
setScreen("setup");

};

/* JOIN ROOM */

const joinRoom=()=>{

if(!name || room.length!==4) return;

const ref=db.ref("rooms/"+room);

ref.once("value",snap=>{

if(!snap.exists()){
alert("Room not found");
return;
}

const data=snap.val();

if(data.player2){
alert("Room full");
return;
}

ref.update({player2:name});

setPlayer(2);
setScreen("setup");

});

};

/* LISTENER */

useEffect(()=>{

if(!room) return;

const ref=db.ref("rooms/"+room);

ref.on("value",snap=>{
setGameData(snap.val());
});

return()=>ref.off();

},[room]);

/* TIMER */

useEffect(()=>{

if(!gameData || gameData.winner) return;

const interval=setInterval(()=>{

const remaining=Math.floor((gameData.turnEnd-Date.now())/1000);

setTimeLeft(remaining>0?remaining:0);

if(remaining<=0 && gameData.turn===player){

const nextTurn=player===1?2:1;

db.ref("rooms/"+room).update({
turn:nextTurn,
turnEnd:Date.now()+gameData.timer*1000
});

}

},500);

return()=>clearInterval(interval);

},[gameData]);

/* START GAME */

useEffect(()=>{
if(gameData?.secret1 && gameData?.secret2){
setScreen("play");
}
},[gameData]);

/* SECRET */

const submitSecret=()=>{

db.ref("rooms/"+room).update({
["secret"+player]:secret
});

setScreen("waiting");

};

/* GUESS */

const makeGuess=()=>{

if(gameData.turn!==player) return;

const opponentSecret=player===1?gameData.secret2:gameData.secret1;

if(guess===opponentSecret){

db.ref("rooms/"+room).update({winner:player});

}else{

const nextTurn=player===1?2:1;

db.ref("rooms/"+room).update({
turn:nextTurn,
turnEnd:Date.now()+gameData.timer*1000
});

}

setGuess("");

};

/* HEADER */

const Header=()=>(
<div
className="text-center text-5xl font-extrabold mb-6 bg-gradient-to-r from-yellow-300 via-pink-300 to-cyan-300 text-transparent bg-clip-text"
style={{WebkitTextStroke:"2px white"}}
>
AH NUMBER GAME
</div>
);

/* MENU */

if(screen==="menu")

return(

<div className="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl">

<Header/>

<input
className="border p-2 w-full mb-3"
placeholder="Your name"
value={name}
onChange={e=>setName(e.target.value)}
/>

<select
className="border p-2 w-full mb-3"
value={timer}
onChange={e=>setTimer(parseInt(e.target.value))}
>

<option value="30">Easy (30s)</option>
<option value="20">Normal (20s)</option>
<option value="10">Hard (10s)</option>

</select>

<button
onClick={createRoom}
className="bg-purple-600 text-white w-full p-2 mb-3 rounded">
Create Room
</button>

<input
className="border p-2 w-full mb-3 text-center"
placeholder="Room Code"
maxLength="4"
value={room}
onChange={e=>setRoom(e.target.value)}
/>

<button
onClick={joinRoom}
className="bg-pink-600 text-white w-full p-2 rounded">
Join Room
</button>

</div>

);

/* SETUP */

if(screen==="setup")

return(

<div className="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl">

<Header/>

<h2 className="text-center font-bold mb-4">
Room Code: <span className="text-purple-600 text-2xl">{room}</span>
</h2>

<input
className="border p-2 w-full mb-2 text-center text-xl"
maxLength="4"
value={secret}
onChange={e=>setSecret(e.target.value.replace(/\D/g,''))}
placeholder="Secret Number"
/>

<button
onClick={submitSecret}
className="bg-purple-600 text-white w-full p-2 rounded">
Submit Secret
</button>

</div>

);

/* WAITING */

if(screen==="waiting")

return(
<div className="text-white text-center mt-40 text-2xl">
<Header/>
Waiting for opponent...
</div>
);

/* PLAY */

if(screen==="play")

return(

<div className="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl">

<Header/>

<div className="text-center mb-3 font-semibold">
Your Opponent : {player===1?gameData.player2:gameData.player1}
</div>

<div className="text-center mb-4 font-semibold bg-purple-500 text-white p-2 rounded">

{gameData.turn===1
? `${gameData.player1} Turn (${timeLeft}s)`
: `${gameData.player2} Turn (${timeLeft}s)`
}

</div>

<input
className="border p-2 w-full mb-2 text-center text-xl"
value={guess}
onChange={e=>setGuess(e.target.value.replace(/\D/g,''))}
maxLength="4"
placeholder="Enter Guess"
/>

<button
disabled={gameData.turn!==player}
onClick={makeGuess}
className={`w-full p-2 rounded text-white ${
gameData.turn===player?"bg-purple-600":"bg-gray-400"
}`}
>
Submit Guess
</button>

</div>

);

return null;

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
